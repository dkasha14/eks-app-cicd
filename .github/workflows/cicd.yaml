name: EKS CI/CD Pipeline

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
       FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

    - name: Checkout code
      uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 816069164153.dkr.ecr.us-east-1.amazonaws.com

    - name: Build Docker image
      run: |
        docker build -t dev-eks-app .

    - name: Tag image
      run: |
        docker tag dev-eks-app:latest 816069164153.dkr.ecr.us-east-1.amazonaws.com/dev-eks-app:latest

    - name: Push to ECR
      run: |
        docker push 816069164153.dkr.ecr.us-east-1.amazonaws.com/dev-eks-app:latest

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region $AWS_REGION --name EKS-DEV

    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/
