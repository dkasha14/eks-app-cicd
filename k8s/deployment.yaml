apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eks-app
  template:
    metadata:
      labels:
        app: eks-app
    spec:
      containers:
      - name: eks-app-container
        image: 816069164153.dkr.ecr.us-east-1.amazonaws.com/dev-eks-app:latest       
        ports:
        - containerPort: 5000
